services:

  ###########################
  # DEPENDENCIES            #
  ###########################

  # Generate RSA key for xtm-composer (PKCS#8 format)
  rsa-key-generator:
    image: alpine/openssl:latest
    volumes:
      - rsakeys:/keys
    entrypoint: ["/bin/ash"]
    command: ["-c", "if [ ! -f /keys/private_key.pem ]; then openssl genpkey -algorithm RSA -out /keys/private_key.pem -pkeyopt rsa_keygen_bits:4096; fi && tail -f /dev/null"]
    healthcheck:
      test: ["CMD", "test", "-f", "/keys/private_key.pem"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
  redis:
    image: redis:8.8.0
    restart: always
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.16
    volumes:
      - esdata:/usr/share/elasticsearch/data
    environment:
      # Comment-out the line below for a cluster of multiple nodes
      - discovery.type=single-node
      # Uncomment the line below below for a cluster of multiple nodes
      # - cluster.name=docker-cluster
      - xpack.ml.enabled=false
      - xpack.security.enabled=false
      - thread_pool.search.queue_size=5000
      - logger.org.elasticsearch.discovery="ERROR"
      - "ES_JAVA_OPTS=-Xms${ELASTIC_MEMORY_SIZE} -Xmx${ELASTIC_MEMORY_SIZE}"
    restart: always
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://elasticsearch:9200/_cluster/health?wait_for_status=yellow >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 50
  pgsql-xtm-one:
    # Dedicated pgvector-enabled instance for XTM One.
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${XTM_ONE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${XTM_ONE_POSTGRES_PASSWORD}
      POSTGRES_DB: xtm_one
    volumes:
      - pgsqlxtmonedata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${XTM_ONE_POSTGRES_USER}", "-d", "xtm_one" ]
      interval: 10s
      timeout: 5s
      retries: 5
  minio:
    image: minio/minio:latest
    volumes:
      - s3data:/data
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}    
    command: server /data
    restart: always
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
  rabbitmq:
    image: rabbitmq:4.3-management
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
      - RABBITMQ_NODENAME=rabbit01@localhost
    volumes:
      - type: bind
        source: ./rabbitmq.conf
        target: /etc/rabbitmq/rabbitmq.conf 
      - amqpdata:/var/lib/rabbitmq
    restart: always
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 30s
      retries: 3

  ###########################
  # COMMON                  #
  ###########################

  xtm-composer:
    image: filigran/xtm-composer:latest
    platform: linux/amd64
    environment:
      - MANAGER__ID=${XTM_COMPOSER_ID}
      - "MANAGER__NAME=XTM Integrations Manager"
      - MANAGER__CREDENTIALS_KEY_FILEPATH=/keys/private_key.pem
      - OPENCTI__ENABLE=true
      - OPENCTI__URL=http://opencti:8080
      - OPENCTI__TOKEN=${OPENCTI_ADMIN_TOKEN}
      - OPENCTI__DAEMON__SELECTOR=docker
      - OPENCTI__DAEMON__DOCKER__NETWORK_MODE=${COMPOSE_PROJECT_NAME}_default
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - rsakeys:/keys:ro  # RSA key mounted as read-only
    depends_on:
      rsa-key-generator:
        condition: service_healthy
      opencti:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always

  ###########################
  # OPENCTI                 #
  ###########################
  
  opencti:
    image: opencti/platform:${OPENCTI_VERSION:-latest}
    environment:
      - NODE_OPTIONS=--max-old-space-size=8096
      - APP__PORT=8080
      - APP__BASE_URL=${OPENCTI_EXTERNAL_SCHEME}://${OPENCTI_HOST}:${OPENCTI_PORT}
      - APP__ADMIN__EMAIL=${OPENCTI_ADMIN_EMAIL}
      - APP__ADMIN__PASSWORD=${OPENCTI_ADMIN_PASSWORD}
      - APP__ADMIN__TOKEN=${OPENCTI_ADMIN_TOKEN}
      - APP__ENCRYPTION_KEY=${OPENCTI_ENCRYPTION_KEY}
      - REDIS__HOSTNAME=redis
      - REDIS__PORT=6379
      - ELASTICSEARCH__URL=http://elasticsearch:9200
      - ELASTICSEARCH__NUMBER_OF_REPLICAS=0
      - MINIO__ENDPOINT=minio
      - MINIO__PORT=9000
      - MINIO__USE_SSL=false
      - MINIO__ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO__SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - RABBITMQ__HOSTNAME=rabbitmq
      - RABBITMQ__PORT=5672
      - RABBITMQ__PORT_MANAGEMENT=15672
      - RABBITMQ__MANAGEMENT_SSL=false
      - RABBITMQ__USERNAME=${RABBITMQ_DEFAULT_USER}
      - RABBITMQ__PASSWORD=${RABBITMQ_DEFAULT_PASS}
      - SMTP__HOSTNAME=${SMTP_HOSTNAME}
      - SMTP__PORT=25
      - PROVIDERS__LOCAL__STRATEGY=LocalStrategy
      - APP__HEALTH_ACCESS_KEY=${OPENCTI_HEALTHCHECK_ACCESS_KEY}
      # XTM One
      - XTM__XTM_ONE_URL=http://xtm-one:4000
      - XTM__XTM_ONE_TOKEN=${PLATFORM_REGISTRATION_TOKEN}
    ports:
      - "${OPENCTI_PORT}:8080"
    depends_on:
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: always
    healthcheck:
      test:  ["CMD", "wget", "-qO-", "http://opencti:8080/health?health_access_key=${OPENCTI_HEALTHCHECK_ACCESS_KEY}"]
      interval: 10s
      timeout: 5s
      retries: 20
  worker:
    image: opencti/worker:${OPENCTI_VERSION:-latest}
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
    depends_on:
      opencti:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 3
    restart: always

  ###########################
  # OPENCTI CONNECTORS      #
  ###########################

  connector-export-file-stix:
    image: opencti/connector-export-file-stix:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_EXPORT_FILE_STIX_ID} # Valid UUIDv4
      - CONNECTOR_TYPE=INTERNAL_EXPORT_FILE
      - CONNECTOR_NAME=ExportFileStix2
      - CONNECTOR_SCOPE=application/json
    restart: always
    depends_on:
      opencti:
        condition: service_healthy
  connector-export-file-csv:
    image: opencti/connector-export-file-csv:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_EXPORT_FILE_CSV_ID} # Valid UUIDv4
      - CONNECTOR_TYPE=INTERNAL_EXPORT_FILE
      - CONNECTOR_NAME=ExportFileCsv
      - CONNECTOR_SCOPE=text/csv
    restart: always
    depends_on:
      opencti:
        condition: service_healthy
  connector-export-file-txt:
    image: opencti/connector-export-file-txt:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_EXPORT_FILE_TXT_ID} # Valid UUIDv4
      - CONNECTOR_TYPE=INTERNAL_EXPORT_FILE
      - CONNECTOR_NAME=ExportFileTxt
      - CONNECTOR_SCOPE=text/plain
    restart: always
    depends_on:
      opencti:
        condition: service_healthy
  connector-import-file-stix:
    image: opencti/connector-import-file-stix:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_IMPORT_FILE_STIX_ID} # Valid UUIDv4
      - CONNECTOR_TYPE=INTERNAL_IMPORT_FILE
      - CONNECTOR_NAME=ImportFileStix
      - CONNECTOR_VALIDATE_BEFORE_IMPORT=true # Validate any bundle before import
      - CONNECTOR_SCOPE=application/json,text/xml
      - CONNECTOR_AUTO=true # Enable/disable auto-import of file
    restart: always
    depends_on:
      opencti:
        condition: service_healthy
  connector-import-document:
    image: opencti/connector-import-document:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_IMPORT_DOCUMENT_ID} # Valid UUIDv4
      - CONNECTOR_TYPE=INTERNAL_IMPORT_FILE
      - CONNECTOR_NAME=ImportDocument
      - CONNECTOR_VALIDATE_BEFORE_IMPORT=true # Validate any bundle before import
      - CONNECTOR_SCOPE=application/pdf,text/plain,text/html
      - CONNECTOR_AUTO=true # Enable/disable auto-import of file
      - CONNECTOR_ONLY_CONTEXTUAL=false # Only extract data related to an entity (a report, a threat actor, etc.)
      - IMPORT_DOCUMENT_CREATE_INDICATOR=true
    restart: always
    depends_on:
      opencti:
        condition: service_healthy
  connector-import-file-yara:
    image: opencti/connector-import-file-yara:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_IMPORT_FILE_YARA_ID} # Valid UUIDv4
      - CONNECTOR_NAME=ImportFileYARA
      - CONNECTOR_VALIDATE_BEFORE_IMPORT=true # Validate any bundle before import
      - CONNECTOR_SCOPE=text/yara+plain
      - CONNECTOR_AUTO=false # Enable/disable auto-import of file
      - YARA_IMPORT_FILE_SPLIT_RULES=true
    restart: always
    depends_on:
      opencti:
        condition: service_healthy
  connector-analysis:
    image: opencti/connector-import-document:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_ANALYSIS_ID} # Valid UUIDv4
      - CONNECTOR_TYPE=INTERNAL_ANALYSIS
      - CONNECTOR_NAME=ImportDocumentAnalysis
      - CONNECTOR_VALIDATE_BEFORE_IMPORT=false # Validate any bundle before import
      - CONNECTOR_SCOPE=application/pdf,text/plain,text/html
      - CONNECTOR_AUTO=true # Enable/disable auto-import of file
      - CONNECTOR_ONLY_CONTEXTUAL=false # Only extract data related to an entity (a report, a threat actor, etc.)
    restart: always
    depends_on:
      opencti:
        condition: service_healthy
  connector-import-external-reference:
    image: opencti/connector-import-external-reference:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_IMPORT_EXTERNAL_REFERENCE_ID}
      - CONNECTOR_NAME=ImportExternalReference
    restart: always
    depends_on:
      opencti:
        condition: service_healthy          

  ###########################
  # OPENCTI DEFAULT DATA    #
  ###########################

  connector-opencti:
    image: opencti/connector-opencti:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_OPENCTI_ID}
      - "CONNECTOR_NAME=OpenCTI Datasets"
      - CONNECTOR_SCOPE=marking-definition,identity,location
      - CONNECTOR_AUTO_CREATE_SERVICE_ACCOUNT=true
      - CONNECTOR_AUTO_CREATE_SERVICE_ACCOUNT_CONFIDENCE_LEVEL=100
    restart: always
    depends_on:
      opencti:
        condition: service_healthy      
  connector-mitre:
    image: opencti/connector-mitre:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=http://opencti:8080
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_MITRE_ID}
      - CONNECTOR_AUTO_CREATE_SERVICE_ACCOUNT=true
      - CONNECTOR_AUTO_CREATE_SERVICE_ACCOUNT_CONFIDENCE_LEVEL=75      
    restart: always
    depends_on:
      opencti:
        condition: service_healthy

  ###########################
  # XTM ONE                 #
  ###########################

  xtm-one:
    image: xtmone/platform:latest
    environment:
      - PLATFORM_MODE=xtm_one
      - PLATFORM_REGISTRATION_TOKEN=${PLATFORM_REGISTRATION_TOKEN}
      - BASE_URL=${XTM_ONE_EXTERNAL_SCHEME}://${XTM_ONE_HOST}:${XTM_ONE_PORT}
      - FRONTEND_URL=${XTM_ONE_EXTERNAL_SCHEME}://${XTM_ONE_HOST}:${XTM_ONE_PORT}
      - ADMIN_EMAIL=${XTM_ONE_ADMIN_EMAIL}
      - ADMIN_PASSWORD=${XTM_ONE_ADMIN_PASSWORD}
      - SECRET_KEY=${XTM_ONE_SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://${XTM_ONE_POSTGRES_USER}:${XTM_ONE_POSTGRES_PASSWORD}@pgsql-xtm-one:5432/xtm_one
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=${XTM_ONE_S3_BUCKET:-xtm-one-files}
      - S3_USE_SSL=false
      - LOG_LEVEL=${XTM_ONE_LOG_LEVEL:-info}
      - LOG_FORMAT=${XTM_ONE_LOG_FORMAT:-json}
      - ENTERPRISE_LICENSE=${XTM_ONE_ENTERPRISE_LICENSE:-}
      # Internal API endpoint for the OpenCTI integration (Docker hostname)
      - OPENCTI_API_URL=http://opencti:8080
    ports:
      - "${XTM_ONE_PORT}:4000"
    depends_on:
      pgsql-xtm-one:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  xtm-one-worker:
    image: xtmone/worker:latest
    environment:
      - PLATFORM_MODE=xtm_one
      - PLATFORM_REGISTRATION_TOKEN=${PLATFORM_REGISTRATION_TOKEN}
      - ADMIN_EMAIL=${XTM_ONE_ADMIN_EMAIL}
      - ADMIN_PASSWORD=${XTM_ONE_ADMIN_PASSWORD}
      - SECRET_KEY=${XTM_ONE_SECRET_KEY}
      - DATABASE_URL=postgresql+asyncpg://${XTM_ONE_POSTGRES_USER}:${XTM_ONE_POSTGRES_PASSWORD}@pgsql-xtm-one:5432/xtm_one
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=${XTM_ONE_S3_BUCKET:-xtm-one-files}
      - S3_USE_SSL=false
      - LOG_LEVEL=${XTM_ONE_LOG_LEVEL:-info}
      - LOG_FORMAT=${XTM_ONE_LOG_FORMAT:-json}
      - ENTERPRISE_LICENSE=${XTM_ONE_ENTERPRISE_LICENSE:-}
    depends_on:
      xtm-one:
        condition: service_healthy
    restart: always

  ############################################################
  # No API key required / free public data
  ############################################################

  connector-cisa-known-exploited-vulnerabilities:
    image: opencti/connector-cisa-known-exploited-vulnerabilities:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=${OPENCTI_URL:-http://opencti:8080}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_CISA_KEV_ID}
      - CONNECTOR_NAME=CISA Known Exploited Vulnerabilities
      - CONNECTOR_SCOPE=cisa-kev
      - CONNECTOR_LOG_LEVEL=${CONNECTOR_LOG_LEVEL:-info}
      - CONNECTOR_DURATION_PERIOD=${CISA_KEV_DURATION_PERIOD:-PT24H}
    restart: always
    depends_on:
      opencti:
        condition: service_healthy
    profiles: ["no-key", "all"]

  connector-first-epss-bulk:
    image: opencti/connector-first-epss-bulk:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=${OPENCTI_URL:-http://opencti:8080}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_FIRST_EPSS_BULK_ID}
      - CONNECTOR_NAME=External Import First EPSS Connector
      - CONNECTOR_LOG_LEVEL=${CONNECTOR_LOG_LEVEL:-info}
      - CONNECTOR_DURATION_PERIOD=${FIRST_EPSS_DURATION_PERIOD:-PT24H}
      - FIRST_EPSS_API_BASE_URL=${FIRST_EPSS_API_BASE_URL:-https://epss.cyentia.com}
    restart: always
    depends_on:
      opencti:
        condition: service_healthy
    profiles: ["no-key", "all"]

  connector-cvelistv5:
    image: opencti/connector-cvelistv5:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=${OPENCTI_URL:-http://opencti:8080}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_CVELISTV5_ID}
      - CONNECTOR_NAME=CVEProject cvelistV5
      - CONNECTOR_SCOPE=identity,vulnerability,software
      - CONNECTOR_LOG_LEVEL=${CONNECTOR_LOG_LEVEL:-info}
      - CONNECTOR_DURATION_PERIOD=${CVELISTV5_DURATION_PERIOD:-PT24H}
      - CVELISTV5_REPO_URL=${CVELISTV5_REPO_URL:-https://github.com/CVEProject/cvelistV5.git}
      - CVELISTV5_REPO_BRANCH=${CVELISTV5_REPO_BRANCH:-main}
      - CVELISTV5_LOCAL_PATH=/opt/cvelistV5
      - CVELISTV5_HISTORY_START_YEAR=${CVELISTV5_HISTORY_START_YEAR:-2019}
    volumes:
      - cvelistv5-clone:/opt/cvelistV5
    restart: always
    depends_on:
      opencti:
        condition: service_healthy
    profiles: ["no-key", "all"]

  connector-shodan-internetdb:
    image: opencti/connector-shodan-internetdb:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=${OPENCTI_URL:-http://opencti:8080}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_SHODAN_INTERNETDB_ID}
      - CONNECTOR_NAME=Shodan InternetDB
      - CONNECTOR_SCOPE=IPv4-Addr
      - CONNECTOR_AUTO=true
      - CONNECTOR_LOG_LEVEL=${CONNECTOR_LOG_LEVEL:-info}
      - SHODAN_MAX_TLP=${SHODAN_MAX_TLP:-TLP:CLEAR}
      - SHODAN_SSL_VERIFY=${SHODAN_SSL_VERIFY:-true}
    restart: always
    depends_on:
      opencti:
        condition: service_healthy
    profiles: ["no-key", "all"]

  ############################################################
  # Free API key required / community quota
  ############################################################

  connector-abuseipdb-ipblacklist:
    image: opencti/connector-abuseipdb-ipblacklist:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=${OPENCTI_URL:-http://opencti:8080}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_ABUSEIPDB_IPBLACKLIST_ID}
      - CONNECTOR_NAME=AbuseIPDB IP Blacklist
      - CONNECTOR_SCOPE=abuseipdb
      - CONNECTOR_LOG_LEVEL=${CONNECTOR_LOG_LEVEL:-info}
      - CONNECTOR_DURATION_PERIOD=${ABUSEIPDB_DURATION_PERIOD:-PT24H}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - ABUSEIPDB_SCORE=${ABUSEIPDB_SCORE:-75}
      - ABUSEIPDB_LIMIT=${ABUSEIPDB_LIMIT:-10000}
      - ABUSEIPDB_CREATE_INDICATOR=${ABUSEIPDB_CREATE_INDICATOR:-true}
      - ABUSEIPDB_TLP_LEVEL=${ABUSEIPDB_TLP_LEVEL:-clear}
      - ABUSEIPDB_IPVERSION=${ABUSEIPDB_IPVERSION:-mixed}
      - ABUSEIPDB_EXCEPT_COUNTRY=${ABUSEIPDB_EXCEPT_COUNTRY:-}
      - ABUSEIPDB_ONLY_COUNTRY=${ABUSEIPDB_ONLY_COUNTRY:-}
    restart: always
    depends_on:
      opencti:
        condition: service_healthy
    profiles: ["api-key", "all"]

  connector-malwarebazaar-recent-additions:
    image: opencti/connector-malwarebazaar-recent-additions:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=${OPENCTI_URL:-http://opencti:8080}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_MALWAREBAZAAR_RECENT_ADDITIONS_ID}
      - CONNECTOR_NAME=MalwareBazaar Recent Additions
      - CONNECTOR_LOG_LEVEL=${CONNECTOR_LOG_LEVEL:-info}
      - MALWAREBAZAAR_RECENT_ADDITIONS_API_URL=${MALWAREBAZAAR_RECENT_ADDITIONS_API_URL:-https://mb-api.abuse.ch/api/v1/}
      - MALWAREBAZAAR_RECENT_ADDITIONS_API_KEY=${MALWAREBAZAAR_RECENT_ADDITIONS_API_KEY}
      - MALWAREBAZAAR_RECENT_ADDITIONS_COOLDOWN_SECONDS=${MALWAREBAZAAR_RECENT_ADDITIONS_COOLDOWN_SECONDS:-300}
      - MALWAREBAZAAR_RECENT_ADDITIONS_INCLUDE_TAGS=${MALWAREBAZAAR_RECENT_ADDITIONS_INCLUDE_TAGS:-exe,dll,docm,docx,doc,xls,xlsx,xlsm,js}
      - MALWAREBAZAAR_RECENT_ADDITIONS_INCLUDE_REPORTERS=${MALWAREBAZAAR_RECENT_ADDITIONS_INCLUDE_REPORTERS:-}
      - MALWAREBAZAAR_RECENT_ADDITIONS_LABELS=${MALWAREBAZAAR_RECENT_ADDITIONS_LABELS:-malware-bazaar}
      - MALWAREBAZAAR_RECENT_ADDITIONS_LABELS_COLOR=${MALWAREBAZAAR_RECENT_ADDITIONS_LABELS_COLOR:-#54483b}
    restart: always
    depends_on:
      opencti:
        condition: service_healthy
    profiles: ["api-key", "all"]

  connector-urlhaus-recent-payloads:
    image: opencti/connector-urlhaus-recent-payloads:${OPENCTI_CONNECTOR_VERSION:-latest}
    environment:
      - OPENCTI_URL=${OPENCTI_URL:-http://opencti:8080}
      - OPENCTI_TOKEN=${OPENCTI_ADMIN_TOKEN}
      - CONNECTOR_ID=${CONNECTOR_URLHAUS_RECENT_PAYLOADS_ID}
      - CONNECTOR_NAME=URLhaus Recent Payloads
      - CONNECTOR_LOG_LEVEL=${CONNECTOR_LOG_LEVEL:-info}
      - URLHAUS_RECENT_PAYLOADS_API_URL=${URLHAUS_RECENT_PAYLOADS_API_URL:-https://urlhaus-api.abuse.ch/v1/}
      - URLHAUS_RECENT_PAYLOADS_API_KEY=${URLHAUS_RECENT_PAYLOADS_API_KEY}
      - URLHAUS_RECENT_PAYLOADS_COOLDOWN_SECONDS=${URLHAUS_RECENT_PAYLOADS_COOLDOWN_SECONDS:-300}
      - URLHAUS_RECENT_PAYLOADS_INCLUDE_FILETYPES=${URLHAUS_RECENT_PAYLOADS_INCLUDE_FILETYPES:-exe,dll,docm,docx,doc,xls,xlsx,xlsm,js,xll}
      - URLHAUS_RECENT_PAYLOADS_INCLUDE_SIGNATURES=${URLHAUS_RECENT_PAYLOADS_INCLUDE_SIGNATURES:-}
